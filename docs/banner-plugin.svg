<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#132040"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a7dff"/>
      <stop offset="100%" style="stop-color:#6fa3ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="8"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>

  <!-- Decorative cubes (echoing the main banner logo) -->
  <g transform="translate(90, 80)" opacity="0.6">
    <!-- Cube shape -->
    <polygon points="0,20 30,0 60,20 30,40" fill="none" stroke="url(#accent)" stroke-width="1.5"/>
    <polygon points="0,20 0,50 30,70 30,40" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>
    <polygon points="60,20 60,50 30,70 30,40" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
  </g>

  <g transform="translate(1050, 160)" opacity="0.3">
    <polygon points="0,15 22,0 44,15 22,30" fill="none" stroke="url(#accent)" stroke-width="1"/>
    <polygon points="0,15 0,37 22,52 22,30" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.6"/>
    <polygon points="44,15 44,37 22,52 22,30" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="600" y="95" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700" letter-spacing="2">
    Syntropic137
  </text>

  <!-- Subtitle -->
  <text x="600" y="130" text-anchor="middle" fill="#6fa3ff" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="400" letter-spacing="4" text-transform="uppercase">
    CLAUDE CODE PLUGIN
  </text>

  <!-- Divider line -->
  <line x1="400" y1="155" x2="800" y2="155" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>

  <!-- Install command block -->
  <rect x="250" y="175" width="700" height="44" rx="6" fill="#0d1f3c" stroke="#4a7dff" stroke-width="1" opacity="0.8"/>
  <text x="280" y="202" fill="#6fa3ff" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" opacity="0.7">$</text>
  <text x="300" y="202" fill="#c8d6e5" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13">
    /plugin install syntropic137
  </text>

  <!-- Tagline -->
  <text x="600" y="260" text-anchor="middle" fill="#8899aa" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" letter-spacing="1">
    Setup, observe, and operate your AI agent workflow engine
  </text>
</svg>
